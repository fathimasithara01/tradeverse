version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: tradeverse_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: tradeverse
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tradeverse_redis
    restart: always

  app:
    image: tradeverse-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  admin:
    extends:
      service: app
    environment:
      APP_ROLE: admin
    ports:
      - "8081:8080"

  trader:
    extends:
      service: app
    environment:
      APP_ROLE: trader
    ports:
      - "8082:8080"

  customer:
    extends:
      service: app
    environment:
      APP_ROLE: customer
    ports:
      - "8083:8080"

  cron_worker:
    extends:
      service: app
    environment:
      APP_ROLE: cron

volumes:
  postgres_data:
